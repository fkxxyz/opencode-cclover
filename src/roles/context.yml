# Preset role context definitions
# Keys are context IDs referenced by role metadata: contextIds: ["..."]

contexts:
  prompt-best-practices:
    description: "Use when creating or reviewing prompt-bearing artifacts to ensure prompts guide effectively without over-constraining, because prompt quality directly affects AI reasoning and adaptation"
    documents:
      - "docs/specs/prompt-best-practices.md"

  role-development-manual:
    description: "Use when creating or modifying role definitions to design valid metadata and effective prompts, because the system requires specific format for role loading and well-structured roles enable better AI behavior"
    documents:
      - "docs/specs/role-development-manual.md"

  role-document-specification:
    description: "Use when creating or modifying role definition files to ensure consistent structure and valid metadata, because the system requires specific format for role loading"
    documents:
      - "docs/specs/role-document-specification.md"

  role-review-handbook:
    description: "Use when reviewing role definitions to validate workflow alignment, scope correctness, document structure, and prompt usability, because role reviews verify that roles are correct as workflow artifacts and usable system prompts"
    documents:
      - "docs/specs/role-review-handbook.md"

  role-metadata-types:
    description: "Use when creating or modifying role definitions to understand valid frontmatter fields and their type contracts, because role metadata must conform to these TypeScript types for the system to load roles correctly"
    documents:
      - "src/types/role.ts"

  context-registry-types:
    description: "Use when implementing context.yml file operations or context loading logic to ensure type-safe structure validation, because the formal contract prevents runtime errors and ensures consistent context registry structure"
    documents:
      - "src/types/context.ts"

  ai-to-ai-communication-principles:
    description: "Use when communicating with other AI employees to maximize message efficiency and information density, because AI-to-AI communication requires no social protocols and every token should carry information"
    documents:
      - "docs/specs/communication-patterns/ai-to-ai-communication-principles.md"

  communication-reporting-completion:
    description: "Use when completing work that unblocks others to report efficiently with reference_docs instead of lengthy descriptions, because files provide evidence and save tokens"
    documents:
      - "docs/specs/communication-patterns/reporting-completion.md"

  communication-requesting-information:
    description: "Use when you need information from others to proceed, to request efficiently by stating what's needed and what's blocked, because clear blocker context helps recipients prioritize responses"
    documents:
      - "docs/specs/communication-patterns/requesting-information.md"

  communication-delegating-work:
    description: "Use when delegating work to provide complete documentation via reference_docs instead of lengthy messages, because documents are permanent, forwardable, and more efficient than describing requirements in message content"
    documents:
      - "docs/specs/communication-patterns/delegating-work.md"

  communication-consulting-and-discussion:
    description: "Use when discussing options or consulting on decisions to manage multi-round discussion with proper expect_reply and task status coordination, because consultation requires multiple exchanges until alignment is reached"
    documents:
      - "docs/specs/communication-patterns/consulting-and-discussion.md"

  communication-escalating-issues:
    description: "Use when encountering problems outside your authority or capability, or discovering better approaches or unacceptable risks, to escalate efficiently with clear problem statements, because immediate escalation prevents wasted time and ensures critical discoveries reach decision-makers"
    documents:
      - "docs/specs/communication-patterns/escalating-issues.md"

  communication-responding-to-messages:
    description: "Use when responding to messages from other employees to set expect_reply correctly based on whether the conversation continues, because incorrect expect_reply causes coordination failures and communication inefficiency"
    documents:
      - "docs/specs/communication-patterns/responding-to-messages.md"

  task-management-best-practices:
    description: "Use when managing tasks with dependencies or coordinating with the reminder system to maintain accurate status and prevent unnecessary reminders, because the system relies on status to determine when to send reminder events"
    documents:
      - "docs/specs/task-management-best-practices.md"

  subordinate-management-philosophy:
    description: "Use when hiring subordinates to evaluate delegation appropriateness (task independence, parallelization, expertise, context pollution) and write complete initial_message, because incomplete task design causes expensive message loops"
    documents:
      - "docs/specs/subordinate-management-philosophy.md"

  ai-specification-writing-guide:
    description: "Use when creating, modifying, or reviewing specifications in docs/specs/ to ensure specifications are project-specific, modular, concise, and follow prompt principles, because specifications are context building blocks that form AI system prompts and quality directly affects AI behavior"
    documents:
      - "docs/specs/ai-specification-writing-guide.md"

  context-description-writing-guide:
    description: "Use when creating or updating context.yml entries to write descriptions that describe usage situations rather than content topics, because situational descriptions help AI decide whether they need specific context for their current task"
    documents:
      - "docs/specs/context-description-writing-guide.md"

  role-context-best-practices:
    description: "Use when creating or modifying role definitions to decide what belongs in contextIds vs. role body, because separating reusable working context from role-specific identity prevents context bloat and improves role clarity"
    documents:
      - "docs/specs/role-context-best-practices.md"

  role-context-registry:
    description: "Use when creating role definitions to discover available context IDs and understand the context registry structure, because roles must reference valid context IDs from this registry"
    documents:
      - "src/roles/context.yml"

  task-document-format:
    description: "Use when creating TASK or TASKPLAN handoff documents to prevent acceptance contract drift and ensure stable execution boundaries, because the format separates frozen decisions from open questions and keeps PM, Developer, and Reviewer aligned on the same contract"
    documents:
      - "docs/specs/task-document-format.md"

  risk-analysis-practice:
    description: "Use when making decisions that materially affect implementation, architecture, or review to evaluate trade-offs using the six-dimensional risk model and explicit reasoning format, because structured analysis prevents overlooking critical dimensions and ensures decisions are documented"
    documents:
      - "docs/specs/risk-analysis-practice.md"

  leadership-risk-handling:
    description: "Use when a leadership role observes bug reports, blockers, design complaints, collaboration complaints, or other execution anomalies to decide whether they indicate local trouble or system-level risk and choose concrete containment and repair actions, because leadership must detect structural problems early before they spread through multi-agent coordination"
    documents:
      - "docs/specs/leadership-risk-handling.md"

  git-repository-workflow:
    description: "Use when committing changes or merging branches to preserve linear history through rebase and fast-forward merge, because the project uses git bisect for debugging"
    documents:
      - "docs/specs/git-repository-workflow.md"

  code-development-standards:
    description: "Use when implementing code changes to follow reference-driven development, ensure complete change packages (code + tests + docs), validate with test output, and maintain code quality standards, because implementation executes design decisions without improvising architecture and incomplete packages create drift"
    documents:
      - "docs/specs/code-development-standards.md"

  system-entropy-analysis:
    description: "Use when analyzing role structures, hiring chains, or interaction topologies to judge whether the collaboration system can maintain low entropy through proper information processing structure, because system health depends on negative feedback, independent perspective, and information traceability"
    documents:
      - "docs/specs/system-entropy-analysis.md"

  ai-specification-review-guide:
    description: "Use when reviewing specifications to validate quality against systematic checklist (project-specificity, modularity, prompt quality, usability), because specifications must meet these standards to serve as effective AI working context"
    documents:
      - "docs/specs/ai-specification-review-guide.md"

  role-review-report-format:
    description: "Use when producing role review reports to ensure structured, actionable results that enable leaders to make routing decisions without follow-up questions, because the workflow requires consistent report format with all required fields"
    documents:
      - "docs/specs/role-review-report-format.md"

  manager-execution-pattern:
    description: "Use when orchestrating frozen-task execution as a manager role to coordinate executor hiring, review handling, and upstream reporting with proper authority boundaries, because manager roles require consistent patterns for delegation, review coordination, and readiness reporting"
    documents:
      - "docs/specs/manager-execution-pattern.md"

  code-review-handbook:
    description: "Use when reviewing code changes to validate complete change packages against task requirements, design references, and project standards, because reviews must systematically check compliance and catch incomplete packages (missing tests, docs, or navigation updates)"
    documents:
      - "docs/specs/code-review-handbook.md"

  repository-structure-best-practices:
    description: "Use when deciding where to place files, organizing repository structure, or maintaining documentation indexes to ensure all content is recursively reachable from AGENTS.md through structured index branches, because documentation index maintenance is more important than any other organizational concern and proper indexing prevents AI from losing global vision through code search"
    documents:
      - "docs/specs/repository-structure-best-practices.md"
