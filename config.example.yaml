# OpenCode CClover 配置文件
# 位置: ~/.config/opencode-cclover/config.yaml

# Boss 列表（全局,不绑定到特定项目）
bosses:
  - bayecao
  # - another-boss

# HTTP 服务器端口（可选，默认 4097）
# 优先级: 环境变量 CCLOVER_PORT > 配置文件 port > 默认值 4097
# port: 4097

projects:
  # 示例项目配置
  - name: my-app
    path: /path/to/my-app
    enabled: true
  
  # 可以添加更多项目
  # - name: another-project
  #   path: /path/to/another-project
  #   enabled: true
  
  # 禁用的项目不会启动员工
  # - name: disabled-project
  #   path: /path/to/disabled-project
  #   enabled: false
